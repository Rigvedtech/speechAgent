<!DOCTYPE html>
<!--
  Recall.ai Output Media Page — Voice Agent Speaker
  ==================================================
  Recall.ai opens this page inside its headless Chromium bot.
  Whatever audio this page plays is streamed into the meeting as the bot's mic.

  Audio path:
    Python (Sarvam TTS) → Int16 PCM over /ws/audio-stream/{bot_id}
      → AudioWorkletProcessor → AudioContext.destination → Recall.ai captures → Teams/Zoom/Meet hears bot
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Interviewer — Output Media</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #e8e8e8;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      width: 1280px;
      height: 720px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background:rgb(4, 85, 236);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      user-select: none;
      position: relative;
    }

    .avatar.speaking::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 3px solid #2b62ff;
      animation: pulse 1s ease-out infinite;
    }

    @keyframes pulse {
      0%   { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.35); }
    }

    .name {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      color: #aaa;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #555;
      transition: background 0.3s;
    }

    .dot.connected    { background: #22c55e; }
    .dot.speaking     { background: #2b62ff; animation: blink 0.8s step-start infinite; }
    .dot.reconnecting { background: #f59e0b; }
    .dot.error        { background: #ef4444; }

    @keyframes blink { 50% { opacity: 0.3; } }

    canvas#viz {
      width: 320px;
      height: 48px;
      opacity: 0.7;
    }

    .timer {
      font-size: 13px;
      color: #555;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <div class="avatar" id="avatar">P</div>
  <div class="name" id="botName">AI Interviewer</div>
  <div class="status-row">
    <div class="dot" id="dot"></div>
    <span id="statusText">Initialising…</span>
  </div>
  <canvas id="viz" width="320" height="48"></canvas>
  <div class="timer" id="timer">00:00</div>

<script>
/* ─────────────────────────────────────────────────
   Configuration — read from URL query params
   ?page_session_id=<uuid>  (required — injected by api_server.py at bot creation)
   ?name=<string>           (optional, display name)
   ───────────────────────────────────────────────── */
const params          = new URLSearchParams(location.search);
const PAGE_SESSION_ID = params.get('page_session_id') || '';
const BOT_NAME        = decodeURIComponent(params.get('name') || 'Prabhat');

/* Audio format contract (matches Sarvam TTS bulbul:v3 output):
   - Encoding  : Int16 PCM (little-endian)
   - Sample rate: 24000 Hz (bulbul:v3 default)
   - Channels  : 1 (mono) */
const SAMPLE_RATE = 24000;

/* WebSocket endpoint — server resolves page_session_id → bot_id */
const WS_PATH = `/ws/audio-stream/${PAGE_SESSION_ID}`;

/* ─── DOM refs ────────────────────────────────── */
const avatarEl    = document.getElementById('avatar');
const botNameEl   = document.getElementById('botName');
const dotEl       = document.getElementById('dot');
const statusEl    = document.getElementById('statusText');
const timerEl     = document.getElementById('timer');
const canvas      = document.getElementById('viz');
const ctx2d       = canvas.getContext('2d');

botNameEl.textContent = BOT_NAME;

/* ─── Timer ───────────────────────────────────── */
let startTime = Date.now();
setInterval(() => {
  const s = Math.floor((Date.now() - startTime) / 1000);
  timerEl.textContent = `${String(Math.floor(s / 60)).padStart(2,'0')}:${String(s % 60).padStart(2,'0')}`;
}, 1000);

/* ─── State ───────────────────────────────────── */
let audioCtx    = null;
let workletNode = null;
let analyser    = null;
let ws          = null;
let wsRetry     = 0;
const MAX_RETRY = 5;
let isSpeaking  = false;

/* ─── UI helpers ──────────────────────────────── */
function setStatus(state, text) {
  dotEl.className   = `dot ${state}`;
  statusEl.textContent = text;
  avatarEl.className = `avatar${state === 'speaking' ? ' speaking' : ''}`;
  isSpeaking = state === 'speaking';
}

/* ─── Waveform visualiser (30 fps, lightweight) ── */
function drawViz() {
  requestAnimationFrame(drawViz);
  ctx2d.clearRect(0, 0, 320, 48);
  if (!analyser) return;

  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);

  const barW  = 4;
  const gap   = 2;
  const count = Math.floor(320 / (barW + gap));
  const step  = Math.floor(data.length / count);

  ctx2d.fillStyle = isSpeaking ? '#2b62ff' : '#333';

  for (let i = 0; i < count; i++) {
    const val = data[i * step] / 255;
    const h   = Math.max(2, val * 48);
    ctx2d.fillRect(i * (barW + gap), 48 - h, barW, h);
  }
}
drawViz();

/* ─── AudioContext + AudioWorklet setup ──────── */
async function initAudio() {
  audioCtx = new AudioContext({ sampleRate: SAMPLE_RATE, latencyHint: 'interactive' });

  // Recall.ai's headless Chrome auto-grants mic; resume immediately
  if (audioCtx.state === 'suspended') {
    await audioCtx.resume().catch(() => {});
  }

  // AudioWorklet for gapless, low-latency PCM playback
  await audioCtx.audioWorklet.addModule('/static/audio-worklet-processor.js');
  workletNode = new AudioWorkletNode(audioCtx, 'pcm-player-processor', {
    numberOfInputs:  0,
    numberOfOutputs: 1,
    outputChannelCount: [1],
  });

  // Monitor buffer level from worklet
  workletNode.port.onmessage = (e) => {
    if (e.data.type === 'bufferLevel') {
      if (e.data.count === 0 && isSpeaking) {
        // Buffer drained — playback finished.
        // Tell the server so it can unmute STT immediately (accurate to ~5 ms).
        setStatus('connected', 'Listening…');
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'playback_done' }));
          console.info('[voice-agent] playback_done sent to server');
        }
      }
      if (e.data.pct > 90) {
        console.warn(`[voice-agent] Buffer near full: ${e.data.pct}% (${e.data.count}/${e.data.capacity} samples)`);
      }
    }
  };

  // Analyser for waveform visualisation
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 128;

  workletNode.connect(analyser);
  analyser.connect(audioCtx.destination);   // ← Recall.ai captures this
}

/* ─── WebSocket connection + reconnect logic ──── */
async function connect() {
  if (!PAGE_SESSION_ID) {
    setStatus('error', 'Missing ?page_session_id= in URL');
    console.error('[voice-agent] No page_session_id in URL');
    return;
  }

  if (!audioCtx) {
    try {
      await initAudio();
    } catch (err) {
      console.error('[voice-agent] AudioContext init failed:', err);
      setStatus('error', 'Audio init failed');
      return;
    }
  }

  const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
  const url = `${protocol}://${location.host}${WS_PATH}`;
  console.info(`[voice-agent] Connecting to ${url} (attempt ${wsRetry + 1})`);
  setStatus('reconnecting', wsRetry === 0 ? 'Connecting…' : `Reconnecting… (${wsRetry}/${MAX_RETRY})`);

  ws = new WebSocket(url);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    console.info('[voice-agent] WebSocket connected');
    wsRetry = 0;
    setStatus('connected', 'Listening…');
  };

  ws.onmessage = (event) => {
    if (typeof event.data === 'string') {
      // Control messages from server
      try {
        const msg = JSON.parse(event.data);
        if (msg.type === 'start_speaking') {
          setStatus('speaking', 'Speaking…');
          // Do NOT flush here — sentences append seamlessly in the ring buffer.
        } else if (msg.type === 'flush') {
          // User interrupted mid-speech — discard buffered audio immediately
          workletNode.port.postMessage({ type: 'flush' });
          setStatus('connected', 'Listening…');
          console.info('[voice-agent] Ring buffer flushed (interrupt)');
        } else if (msg.type === 'stop_speaking') {
          // Don't reset immediately — let buffer drain naturally
        } else if (msg.type === 'ping') {
          ws.send(JSON.stringify({ type: 'pong' }));
        }
      } catch (_) { /* not JSON — ignore */ }
      return;
    }

    // Binary frame → raw Int16 PCM
    if (event.data instanceof ArrayBuffer && event.data.byteLength > 0) {
      setStatus('speaking', 'Speaking…');
      workletNode.port.postMessage(event.data, [event.data]);   // zero-copy transfer
    }
  };

  ws.onerror = (err) => {
    console.error('[voice-agent] WebSocket error:', err);
  };

  ws.onclose = (ev) => {
    console.warn(`[voice-agent] WebSocket closed (code=${ev.code})`);
    setStatus('reconnecting', 'Disconnected');

    if (wsRetry < MAX_RETRY) {
      const delay = Math.min(500 * 2 ** wsRetry, 8000);   // 500ms → 8s
      wsRetry++;
      console.info(`[voice-agent] Retry in ${delay}ms`);
      setTimeout(connect, delay);
    } else {
      setStatus('error', 'Connection lost — reload to retry');
      console.error('[voice-agent] Max retries reached');
    }
  };
}

/* ─── Cleanup on unload ────────────────────────── */
window.addEventListener('beforeunload', () => {
  if (ws) ws.close(1000, 'page unload');
  if (workletNode) workletNode.disconnect();
  if (audioCtx) audioCtx.close();
});

/* ─── Boot ─────────────────────────────────────── */
connect();
</script>
</body>
</html>
